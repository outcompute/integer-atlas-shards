name: PR validate

# Gate every contributor PR before merge: schema-validate the JSON, then
# independently verify the shard(s) the PR adds to accepted/ at their pinned
# algorithm release.
on:
  pull_request:
    paths:
      - "pending/**"
      - "accepted/**"
      - "schema/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Schema + range checks across all manifests/work orders (cheap).
      - run: pip install jsonschema
      - run: python scripts/validate.py

      # Which accepted/ manifests does this PR add or change?
      - id: changed
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          files=$(git diff --name-only --diff-filter=AM "$base" HEAD -- 'accepted/**/*.json' | tr '\n' ' ')
          echo "files=$files" >> "$GITHUB_OUTPUT"

      # Independent verify of just those shards: download, match hashes, recompute a sample.
      - run: |
          if [ -n "${{ steps.changed.outputs.files }}" ]; then
            pip install "integer-atlas-algos[parquet]"
            python scripts/verify.py --degree 0.1 ${{ steps.changed.outputs.files }}
          else
            echo "no accepted/ manifests added or changed; nothing to verify"
          fi
